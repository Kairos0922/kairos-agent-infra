# cargo-deny 供应链门禁配置(ADR:安全约定——依赖只用知名活跃包,防 typosquatting/CVE/许可证污染)。
# CI 每次 PR + 每周定时跑 `cargo deny check`;新 CVE 不随代码变更出现,故需定时扫。
# schema 对齐 cargo-deny 0.16+(旧版 severity/copyleft 字段已移除:未列入 allow 即默认拒绝)。

[advisories]
# RustSec 漏洞库:有公告的依赖默认拒绝。yanked 版本一律拒绝。
# 需临时豁免某条公告时,在 ignore 列出 RUSTSEC-ID 并注明原因与复查时间。
yanked = "deny"
ignore = []

[licenses]
# 白名单之外的许可证一律拒绝(默认行为)。自托管服务,取宽松许可 + 拒绝强 copyleft(GPL 等)。
# 新依赖引入未列许可证会 CI 失败——届时核实后再决定加入白名单还是换依赖。
confidence-threshold = 0.9
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-DFS-2016",
    "Unicode-3.0",
]

[bans]
# 同一依赖多版本共存:先 warn(不阻断),避免早期误伤;膨胀失控时再收紧为 deny。
multiple-versions = "warn"
# 通配符版本(version = "*")一律拒绝——违反「不用开放区间」的安全约定。
wildcards = "deny"

[sources]
# 只允许 crates.io 官方源;未知 registry / 未知 git 源一律拒绝(防供应链投毒)。
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
