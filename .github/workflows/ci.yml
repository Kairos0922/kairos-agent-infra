name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 同一分支/PR 的并发运行只保留最新一次,取消旧的
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: 验证链(fmt + clippy + 测试 + crate 边界)
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: 缓存 Cargo
        uses: Swatinem/rust-cache@v2

      - name: 格式检查
        run: cargo fmt --all -- --check

      - name: Clippy(告警即失败;crate 依赖边界由编译强制)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: 测试
        run: cargo test --all --all-features

      - name: 文档链接与锚点检查
        run: cargo xtask check-docs

  coverage:
    name: 覆盖率(核心模块 ≥80%)
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: 缓存 Cargo
        uses: Swatinem/rust-cache@v2

      - name: 安装 cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: 覆盖率(foundation 核心模块门槛 80%)
        run: cargo llvm-cov --package kairos_foundation --fail-under-lines 80
