name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 同一分支/PR 的并发运行只保留最新一次,取消旧的
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: 验证链(lint + 类型 + 依赖方向 + 测试)
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v7

      - name: 安装 uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: 安装依赖(按 uv.lock 锁定版本)
        run: uv sync --locked

      - name: ruff 格式检查
        run: uv run ruff format --check .

      - name: ruff lint
        run: uv run ruff check .

      - name: mypy 类型检查(strict)
        run: uv run mypy

      - name: import-linter 依赖方向检查
        run: uv run lint-imports

      - name: pytest + 覆盖率
        run: uv run pytest --cov
