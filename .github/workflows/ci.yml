name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # 每周一 03:17 UTC 定时跑:cargo-deny 需定期扫新 CVE(漏洞公告不随代码变更出现)。
  schedule:
    - cron: "17 3 * * 1"

# 同一分支/PR 的并发运行只保留最新一次,取消旧的
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

# 工具链版本由 rust-toolchain.toml 单一 pin(1.96.1 + 组件);rustup 在首次 cargo
# 调用时自动读取安装,CI 不再声明 @stable,避免版本双写漂移。

jobs:
  verify:
    name: 验证链(fmt + clippy + 测试 + crate 边界)
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 缓存 Cargo
        uses: Swatinem/rust-cache@v2

      - name: 格式检查
        run: cargo fmt --all -- --check

      - name: Clippy(告警即失败;crate 依赖边界由编译强制)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: 测试
        run: cargo test --all --all-features

      - name: 文档链接与锚点检查
        run: cargo xtask check-docs

  coverage:
    name: 覆盖率(核心模块 ≥80%)
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 缓存 Cargo
        uses: Swatinem/rust-cache@v2

      - name: 安装 cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: 覆盖率(全 workspace 行覆盖门槛 80%)
        run: cargo llvm-cov --workspace --fail-under-lines 80

  supply-chain:
    name: 供应链(cargo-deny:漏洞 / 许可证 / 来源 / 通配)
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: cargo-deny 检查
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories licenses bans sources
